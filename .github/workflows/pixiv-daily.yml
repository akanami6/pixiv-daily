name: Pixiv Daily Anime Images to Email

on:
  schedule:
    # Runs every day at 01:00 UTC (09:00 Beijing time)
    - cron: "0 1 * * *"
  workflow_dispatch:  # allows manual trigger from GitHub UI
  push:
    branches: [master]

jobs:
  pixiv-daily:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install playwright requests

      - name: Install Chromium
        run: playwright install chromium --with-deps

      - name: Run Pixiv Daily
        env:
          PIXIV_USERNAME: ${{ secrets.PIXIV_USERNAME }}
          PIXIV_PASSWORD: ${{ secrets.PIXIV_PASSWORD }}
          GMAIL_SENDER: ${{ secrets.GMAIL_SENDER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_RECEIVER: ${{ secrets.GMAIL_RECEIVER }}
          SEARCH_TAGS: "巨乳 美少女 R-18"
          SEARCH_ORDER: "popular_d"
          SEARCH_MODE: "r18"
        run: python pixiv_daily_cloud.py
