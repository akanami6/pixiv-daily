name: Anime Daily Images to Email

on:
  schedule:
    # Runs every day at 01:00 UTC (09:00 Beijing time)
    - cron: "0 1 * * *"
  workflow_dispatch:  # allows manual trigger from GitHub UI
  push:
    branches: [master]

jobs:
  danbooru-daily:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run Danbooru Daily
        env:
          GMAIL_SENDER: ${{ secrets.GMAIL_SENDER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          GMAIL_RECEIVER: ${{ secrets.GMAIL_RECEIVER }}
          SEARCH_TAGS: "large_breasts"
          MIN_SCORE: "0"
        run: python pixiv_daily_cloud.py
